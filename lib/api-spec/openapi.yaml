        learningPacePreference:
          type: string
          enum: [slow, normal, fast, adaptive]
        preferredCourseType:
          type: string
          enum: [theoretical, practical, mixed, adaptive]
        preferredDifficulty:
          type: string
          enum: [beginner, intermediate, advanced, adaptive]
        showExplanationsAfterCorrect:
          type: boolean
        enableHints:
          type: boolean
        examDate:
          type: ["string", "null"]
          format: date-time
        dailyStudyMinutes:
          type: integer
        preferredLanguage:
          type: string
          enum: [en, el]
        agentMode:
          type: string
          enum: [socratic, direct, beginner, exam_coach, deep_theory, practical, error_diagnosis, feynman, math, memory_coach]
