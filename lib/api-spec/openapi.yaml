            required: [label, value, max]
        pipelineFlow:
          type: array
          items:
            type: object
            properties:
              from:
                type: string
              to:
                type: string
              value:
                type: number
              color:
                type: string
            required: [from, to, value, color]
        hasRealData:
          type: boolean
      required:
        - masteryHeatmap
        - learningTimeline
        - skillRadar
        - pipelineFlow
        - hasRealData

