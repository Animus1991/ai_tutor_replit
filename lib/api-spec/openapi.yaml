    # ─── DASHBOARD ─────────────────────────────────────────────────────────────
    DashboardStats:
      type: object
      properties:
        totalNotes:
          type: integer
        totalCourses:
          type: integer
        completedCourses:
          type: integer
        inProgressCourses:
          type: integer
        totalXp:
          type: integer
        currentStreak:
          type: integer
        weeklyXp:
          type: integer
        averageScore:
          type: number
        recentCourses:
          type: array
          items:
            $ref: "#/components/schemas/Course"
      required:
        - totalNotes
        - totalCourses
        - completedCourses
        - inProgressCourses
        - totalXp
        - currentStreak
        - weeklyXp
        - averageScore
        - recentCourses

    ActivityItem:
      type: object
      properties:
        id:
          type: integer
        activityType:
          type: string
          enum: [course_started, course_completed, note_uploaded, step_completed, quiz_passed, streak_milestone, xp_milestone]
        description:
          type: string
        xpEarned:
          type: integer
        courseId:
          type: ["integer", "null"]
        courseTitle:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - activityType
        - description
        - xpEarned
        - createdAt

    LearnerSignal:
      type: object
      properties:
        label:
          type: string
        score:
          type: integer
          description: 0-100 strength of this evidence-based signal
        detail:
          type: string
      required:
        - label
        - score
        - detail

    Calibration:
      type: object
      description: How well self-rated confidence matches actual correctness
      properties:
        score:
          type: integer
          description: 0-100, 100 = perfectly calibrated (confidence matches accuracy)
        direction:
          type: string
          enum: [overconfident, calibrated, underconfident]
        avgConfidence:
          type: integer
          description: Mean self-rated confidence, 0-100
        sampleSize:
          type: integer
          description: Number of confidence-rated answers used
      required:
        - score
        - direction
        - avgConfidence
        - sampleSize

    LearnerModel:
      type: object
      description: Evidence-based mastery & exam-readiness model inferred from observed behavior
      properties:
        examReadiness:
          type: ["integer", "null"]
          description: 0-100 composite exam-readiness score, null until enough data
        masteryLevel:
          type: ["string", "null"]
          description: Coarse mastery band — developing | proficient | strong
        confidence:
          type: number
          description: 0-1 confidence in the model given data volume
        calibration:
          oneOf:
            - $ref: "#/components/schemas/Calibration"
            - type: "null"
          description: Confidence calibration, null until enough confidence-rated answers
        accuracy:
          type: integer
          description: Observed quiz accuracy, 0-100
        selfReliance:
          type: integer
          description: 0-100, inverse of hint dependency (exam has no hints)
        signals:
          type: array
          items:
            $ref: "#/components/schemas/LearnerSignal"
        strengths:
          type: array
          items:
            type: string
        focusAreas:
          type: array
          items:
            type: string
        conceptMastery:
          type: array
          description: Per-concept mastery derived from first-attempt performance
          items:
            $ref: "#/components/schemas/ConceptMastery"
        readinessByCourse:
          type: array
          description: Concept-rollup readiness per course
          items:
            $ref: "#/components/schemas/CourseReadiness"
        prerequisiteRepairs:
          type: array
          description: Weak concepts whose prerequisite is also weak — fix the prerequisite first
          items:
            $ref: "#/components/schemas/PrerequisiteRepair"
        misconceptions:
          type: array
          description: Detected misconceptions from open mistakes and overconfident errors
          items:
            $ref: "#/components/schemas/Misconception"
        errorPatterns:
          type: array
          description: Aggregated error patterns from observed mistakes
          items:
            $ref: "#/components/schemas/ErrorPattern"
        visualAnalytics:
          $ref: "#/components/schemas/VisualAnalytics"
        dataPointsCollected:
          type: integer
        nextInsightAt:
          type: integer
          description: Graded interactions remaining until the model unlocks
      required:
        - confidence
        - accuracy
        - selfReliance
        - signals
        - strengths
        - focusAreas
        - conceptMastery
        - readinessByCourse
        - prerequisiteRepairs
        - misconceptions
        - errorPatterns
        - dataPointsCollected
        - nextInsightAt

    # ─── CONCEPTS & MASTERY ──────────────────────────────────────────────────
    Concept:
      type: object
      properties:
        id:
          type: integer
        courseId:
          type: integer
        title:
          type: string
        description:
          type: ["string", "null"]
        importance:
          type: number
          description: 1 (peripheral) to 3 (core/exam-critical)
        mastery:
          type: ["integer", "null"]
          description: 0-100 mastery for the current user, null if no evidence yet
        confidence:
          type: ["integer", "null"]
          description: 0-100 evidence-volume confidence in the mastery estimate
        band:
          type: ["string", "null"]
          description: weak | developing | proficient | strong
        attempts:
          type: integer
          description: First-attempt graded interactions on this concept
      required:
        - id
        - courseId
        - title
        - importance
        - attempts

    ConceptEdge:
      type: object
      description: Prerequisite relationship (prerequisite must precede dependent)
      properties:
        prerequisiteConceptId:
          type: integer
        dependentConceptId:
          type: integer
      required:
        - prerequisiteConceptId
        - dependentConceptId

    CourseConcepts:
      type: object
      properties:
        concepts:
          type: array
          items:
            $ref: "#/components/schemas/Concept"
        edges:
          type: array
          items:
            $ref: "#/components/schemas/ConceptEdge"
      required:
        - concepts
        - edges

    ConceptMastery:
      type: object
      properties:
        conceptId:
          type: integer
        title:
          type: string
        courseId:
          type: integer
        courseTitle:
          type: ["string", "null"]
        mastery:
          type: integer
          description: 0-100
        confidence:
          type: integer
          description: 0-100 evidence-volume confidence
        importance:
          type: number
        attempts:
          type: integer
        band:
          type: string
          description: weak | developing | proficient | strong
      required:
        - conceptId
        - title
        - courseId
        - mastery
        - confidence
        - importance
        - attempts
        - band

    CourseReadiness:
      type: object
      properties:
        courseId:
          type: integer
        courseTitle:
          type: ["string", "null"]
        readiness:
          type: ["integer", "null"]
          description: 0-100 concept-rollup readiness for the course
        conceptCount:
          type: integer
        percentComplete:
          type: integer
          description: 0-100 lesson step completion for the course
      required:
        - courseId
        - readiness
        - conceptCount
        - percentComplete

    Misconception:
      type: object
      properties:
        id:
          type: string
        concept:
          type: string
        description:
          type: string
        frequency:
          type: integer
        corrected:
          type: boolean
        suggestedFix:
          type: string
        detectedAt:
          type: string
          format: date-time
        courseTitle:
          type: ["string", "null"]
      required:
        - id
        - concept
        - description
        - frequency
        - corrected
        - suggestedFix
        - detectedAt

    ErrorPattern:
      type: object
      properties:
        type:
          type: string
        frequency:
          type: integer
        concepts:
          type: array
          items:
            type: string
        suggestedRemedy:
          type: string
        category:
          type: string
      required:
        - type
        - frequency
        - concepts
        - suggestedRemedy
        - category

    PrerequisiteRepair:
      type: object
      properties:
        concept:
          type: string
        prerequisite:
          type: string
      required:
        - concept
        - prerequisite

