          enum: [socratic, direct, beginner, exam_coach, deep_theory, practical, error_diagnosis, feynman, math, memory_coach]
        strictSourceMode:
          type: boolean
        socraticMode:
          type: boolean
        lastActiveAt:
          type: ["string", "null"]
          format: date-time
      required:
        - userId
        - totalXp
        - currentStreak
        - longestStreak
        - completedCourses
        - quizFrequencyPreference
        - learningPacePreference
        - preferredCourseType
        - preferredDifficulty
        - showExplanationsAfterCorrect
        - enableHints

    LearningProfileUpdate:
      type: object
