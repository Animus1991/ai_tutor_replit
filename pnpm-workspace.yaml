packages:
  - artifacts/*
  - lib/*
  - lib/integrations/*
  - scripts

autoInstallPeers: false

# Σημείωση:
# - Τα @replit/* plugins είναι ΠΡΟΑΙΡΕΤΙΚΑ (optionalDependencies σε artifacts/learn
#   και artifacts/mockup-sandbox) και φορτώνονται dynamically μόνο όταν τρέχει
#   στο Replit (process.env.REPL_ID set). Εκτός Replit δεν εγκαθίστανται και δεν
#   απαιτούνται. Δεν υπάρχει vendor lock-in.
# - Όλα τα native binaries (rollup, lightningcss, tailwindcss-oxide, esbuild)
#   αφήνονται να εγκατασταθούν αυτόματα από το pnpm για την πλατφόρμα του
#   developer (Windows x64, macOS arm64, Linux x64, κλπ.).

catalog:
  '@tailwindcss/vite': ^4.1.14
  '@tanstack/react-query': ^5.90.21
  '@types/node': ^25.3.3
  '@types/react': 19.2.14
  '@types/react-dom': ^19.2.0
  '@vitejs/plugin-react': ^5.0.4
  '@vitest/coverage-v8': ^2.1.9
  class-variance-authority: ^0.7.1
  clsx: ^2.1.1
  drizzle-orm: ^0.45.2
  framer-motion: ^12.23.24
  lucide-react: ^0.545.0
  react: 19.1.4
  react-dom: 19.1.4
  tailwind-merge: ^3.3.1
  tailwindcss: ^4.1.14
  tsx: ^4.21.0
  vite: ^7.3.2
  vitest: ^2.1.9
  zod: ^3.25.76

minimumReleaseAge: 1440

# Cross-platform support: install native binaries for the current OS/arch,
# plus the platforms most likely to be used by the team (linux x64 for CI/prod).
supportedArchitectures:
  os:
    - current
    - linux
  cpu:
    - current
    - x64
    - arm64
  libc:
    - current
    - glibc
    - musl

onlyBuiltDependencies:
  - '@swc/core'
  - esbuild
  - msw
  - unrs-resolver
  - '@tailwindcss/oxide'
  - lightningcss

overrides:
  '@esbuild-kit/esm-loader': npm:tsx@^4.21.0
