name: ai-tutor-local

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: ai-tutor-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: aitutor
      POSTGRES_USER: aitutor
      POSTGRES_PASSWORD: aitutor_dev
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "aitutor", "-d", "aitutor"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: ai-tutor-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: aitutor
      MINIO_ROOT_PASSWORD: aitutor_dev_secret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 aitutor aitutor_dev_secret &&
      mc mb -p local/ai-tutor-uploads &&
      mc anonymous set download local/ai-tutor-uploads;
      "

volumes:
  postgres_data:
  minio_data:
